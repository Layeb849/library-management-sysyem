
{% load static %}

<div class="floating-logo-container">
    <img src="{% static 'image/logo/logo.jpg' %}" alt="Logo" class="rotating-logo">
</div>

<style>
    .floating-logo-container {
        position: fixed; 
        right: 50px;
        top: 25%; 
        transform: translateY(-50%); 
        z-index: 9999;  
        pointer-events: none;
    }

    .rotating-logo {
        width: 80px;    
        height: 80px;
        border-radius: 50%; 
        border: 2px solid #ffc107; 
        box-shadow: 0 0 15px rgba(255, 193, 7, 0.5); 
        pointer-events: auto; 
        
        /* Animation */
        animation: logo-spin 5s linear infinite;
        transition: 0.3s;
    }

    .rotating-logo:hover {
        animation-play-state: paused;
        transform: scale(1.1);
        cursor: pointer;
    }

    @keyframes logo-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
        .rotating-logo {
            width: 40px;
            height: 40px;
        }
        .floating-logo-container {
            right: 30px;
            top: 20%;
        }
    }
</style>
