{% extends "base.html" %}
{% load static %}

{% block title %}Add Your Review{% endblock %}

{% block content %}
<div class="container py-5 mt-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8">
      
      <div class="review-form-wrapper p-4 p-md-5 shadow-lg border-0 rounded-5 bg-white position-relative overflow-hidden">
        
        <div class="top-accent"></div>

        <div class="row align-items-center">
          <div class="col-md-5 d-none d-md-block border-end border-light text-center">
             <div class="icon-box mb-3 mx-auto shadow-sm">
               <i class="fa fa-pen-nib text-primary fs-3"></i>
             </div>
             <h4 class="fw-bold text-dark">We Value You!</h4>
             <p class="text-muted small px-3">
               Your thoughts help us grow. Share your experience with our library community.
             </p>
             <div class="mt-4">
                <i class="fa fa-quote-left text-primary opacity-25 fs-1"></i>
             </div>
          </div>
          
          <div class="col-md-7 ps-md-4">
            <div class="mb-4 text-center text-md-start">
                <h3 class="fw-bold text-primary mb-1">Add Your Review</h3>
                <p class="text-muted small">It only takes a minute!</p>
            </div>

            <form method="POST" action="{% url 'review_create' %}" enctype="multipart/form-data">
              {% csrf_token %}
              
              <div class="form-floating mb-3">
                <input type="text" name="name" class="form-control elegant-input" id="nameInput" placeholder="Name" required>
                <label for="nameInput"><i class="fa fa-user me-2 text-primary"></i>Full Name</label>
              </div>

              <div class="form-floating mb-3">
                <textarea name="comment" class="form-control elegant-input" id="commentArea" style="height: 130px" placeholder="Comment" required></textarea>
                <label for="commentArea"><i class="fa fa-comment-dots me-2 text-primary"></i>Your Experience</label>
              </div>

              <div class="mb-4">
                <label class="form-label small fw-bold text-secondary mb-2">
                  <i class="fa fa-camera me-1"></i> Profile Photo (Optional)
                </label>
                <input type="file" name="image" class="form-control form-control-sm elegant-file-input" accept="image/*">
              </div>

              <button type="submit" class="btn btn-primary btn-submit w-100 rounded-pill py-3 fw-bold shadow-sm mt-2">
                Submit Feedback <i class="fa fa-paper-plane ms-2"></i>
              </button>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
  /* Form Background Wrapper */
  .review-form-wrapper {
    border-radius: 30px !important;
    border: 1px solid rgba(0,0,0,0.05) !important;
  }

  /* Top Decorative Line */
  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, #0d6efd, #0dcaf0);
  }

  /* Left Side Icon Box */
  .icon-box {
    width: 65px;
    height: 65px;
    background: #f0f7ff;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Inputs Styling */
  .elegant-input {
    border-radius: 12px !important;
    border: 1.5px solid #f1f3f5 !important;
    background-color: #fcfcfc !important;
    transition: all 0.3s ease;
  }

  .elegant-input:focus {
    border-color: #0d6efd !important;
    background-color: #ffffff !important;
    box-shadow: 0 5px 15px rgba(13, 110, 253, 0.08) !important;
  }

  /* File Input Styling */
  .elegant-file-input {
    border-radius: 10px !important;
    background: #f8f9fa !important;
    border: 1px dashed #dee2e6 !important;
    padding: 10px !important;
  }

  /* Button Effect */
  .btn-submit {
    background: linear-gradient(135deg, #0d6efd, #0b5ed7);
    border: none;
    letter-spacing: 0.5px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(13, 110, 253, 0.25) !important;
    opacity: 0.95;
  }

  /* Mobile Responsive Fixes (320px) */
  @media (max-width: 576px) {
    .review-form-wrapper {
        padding: 1.5rem !important;
        border-radius: 20px !important;
    }
    h3 { font-size: 1.5rem !important; }
  }
</style>
{% endblock %}
