{% extends 'base.html' %}

{% block title %}Password Reset Complete | Library{% endblock %}

{% block content %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

/* ===== Background ===== */
.reset-complete-wrapper {
    min-height: 100vh;
    background: linear-gradient(120deg, #667eea, #764ba2, #667eea);
    background-size: 300% 300%;
    animation: bgMove 10s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    padding: 20px;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ===== Glass Card ===== */
.reset-complete-card {
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(18px);
    border-radius: 22px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    width: 100%;
    max-width: 460px;
    padding: 45px 40px;
    text-align: center;
    animation: fadeUp 0.8s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== Success Icon ===== */
.reset-success-icon {
    width: 90px;
    height: 90px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 22px;
    font-size: 36px;
    box-shadow: 0 15px 35px rgba(34,197,94,0.45);
    animation: pop 0.6s ease;
}

@keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* ===== Text ===== */
.reset-title {
    font-weight: 800;
    color: #1e293b;
    margin-bottom: 8px;
}

.reset-text {
    color: #64748b;
    font-size: 0.95rem;
    margin-bottom: 28px;
}

/* ===== Button ===== */
.btn-login {
    position: relative;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    padding: 12px 32px;
    border-radius: 30px;
    font-weight: 700;
    text-decoration: none;
    display: inline-block;
    overflow: hidden;
    transition: 0.3s;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(102,126,234,0.45);
    color: #fff;
}

/* Button shine */
.btn-login::after {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 120%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.6),
        transparent
    );
    transition: 0.6s;
}

.btn-login:hover::after {
    left: 120%;
}
</style>

<div class="reset-complete-wrapper">
    <div class="reset-complete-card">

        <div class="reset-success-icon">
            <i class="fas fa-check-circle"></i>
        </div>

        <h2 class="reset-title">Password Reset Complete</h2>
        <p class="reset-text">
            Your password has been successfully reset.  
            You can now log in using your new password.
        </p>

        <a href="{% url 'login' %}" class="btn-login">
            Log In Now <i class="fas fa-arrow-right ms-2"></i>
        </a>

    </div>
</div>
{% endblock %}
