{% extends 'base.html' %}

{% block title %}Check Your Email | Library{% endblock %}

{% block content %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

/* ===== Background ===== */
.email-sent-wrapper {
    min-height: 100vh;
    background: linear-gradient(120deg, #667eea, #764ba2, #667eea);
    background-size: 300% 300%;
    animation: bgMove 10s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    padding: 20px;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ===== Glass Card ===== */
.email-sent-card {
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(18px);
    border-radius: 22px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    width: 100%;
    max-width: 460px;
    padding: 45px 40px;
    text-align: center;
    animation: fadeUp 0.8s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== Email Icon ===== */
.email-icon {
    width: 90px;
    height: 90px;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 22px;
    font-size: 36px;
    box-shadow: 0 15px 35px rgba(56,189,248,0.45);
    animation: pop 0.6s ease;
}

@keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* ===== Text ===== */
.email-title {
    font-weight: 800;
    color: #1e293b;
    margin-bottom: 8px;
}

.email-text {
    color: #64748b;
    font-size: 0.95rem;
    margin-bottom: 18px;
}

/* ===== Hint ===== */
.email-hint {
    background: #f1f5f9;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 0.85rem;
    color: #475569;
}

/* ===== Button ===== */
.btn-login {
    margin-top: 22px;
    display: inline-block;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    padding: 10px 26px;
    border-radius: 30px;
    font-weight: 700;
    text-decoration: none;
    transition: 0.3s;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(102,126,234,0.45);
    color: #fff;
}
</style>

<div class="email-sent-wrapper">
    <div class="email-sent-card">

        <div class="email-icon">
            <i class="fas fa-envelope-open-text"></i>
        </div>

        <h2 class="email-title">Check Your Email</h2>
        <p class="email-text">
            We’ve sent password reset instructions to your email address.
        </p>

        <div class="email-hint">
            Didn’t receive the email?  
            Please check your <strong>spam folder</strong> or try again later.
        </div>

        <a href="{% url 'login' %}" class="btn-login">
            Back to Login
        </a>

    </div>
</div>
{% endblock %}
