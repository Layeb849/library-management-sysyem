<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Achievement</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .form-card {
            width: 100%;
            max-width: 500px;
            margin: auto;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.9);
        }

        .form-control {
            border-radius: 10px;
            padding: 10px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.15rem rgba(102, 126, 234, 0.4);
            border-color: #667eea;
        }

        .btn-primary {
            border-radius: 10px;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        @media (max-width: 576px) {
            .form-card {
                margin: 20px;
                padding: 10px;
            }

            h3 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow-lg form-card border-0">
        <div class="card-body p-4 p-md-5">

            <h3 class="text-center mb-4 fw-bold text-primary">
                ➕ Add Yearly Achievement
            </h3>

            <form method="POST">
                {% csrf_token %}

                <!-- Year -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Year</label>
                    <input type="text" name="year" class="form-control" placeholder="e.g. 2025" required>
                </div>

                <!-- Title -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Title</label>
                    <input type="text" name="title" class="form-control" placeholder="Enter title" required>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" rows="4" class="form-control" placeholder="Write description..." required></textarea>
                </div>

                <!-- Button -->
                <div class="d-grid mt-3">
                    <button type="submit" class="btn btn-primary fw-semibold">
                        🚀 Submit
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
