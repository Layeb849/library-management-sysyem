{% extends "base.html" %}
{% block title %}Add New Book | Pathokbondhu Pathagar{% endblock %}
{% load static %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-lg rounded-4 p-4">
                <h2 class="fw-bold text-center mb-4">Add New Premium Book</h2>
                
                <form action="{% url 'add_book' %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Book Title</label>
                            <input type="text" name="title" class="form-control rounded-pill" placeholder="Enter title" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Author Name</label>
                            <input type="text" name="author" class="form-control rounded-pill" placeholder="Enter author" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Category</label>
                            <select name="category" class="form-select rounded-pill">
                                <option value="Fiction">Fiction</option>
                                <option value="Non-Fiction">Non-Fiction</option>
                                <option value="Science">Science</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Total Pages</label>
                            <input type="number" name="pages" class="form-control rounded-pill" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Rating (e.g. 4.5)</label>
                            <input type="number" step="0.1" name="rating" class="form-control rounded-pill" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Description</label>
                            <textarea name="description" class="form-control rounded-4" rows="4"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Upload Cover Image</label>
                            <input type="file" name="book_image" class="form-control rounded-pill" required>
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">
                                <i class="fas fa-cloud-upload-alt me-2"></i> Publish Now
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
