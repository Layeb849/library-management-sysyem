<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathagar | Add Donor</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h5 class="mb-0">Library Donor Registration</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Full Name</label>
                            <input type="text" name="name" class="form-control" id="name" placeholder="Enter donor's full name" required>
                        </div>

                        <!-- Designation -->
                        <div class="mb-3">
                            <label for="designation" class="form-label fw-bold">Designation</label>
                            <input type="text" name="designation" class="form-control" id="designation" placeholder="e.g. Student, Teacher, or Profession">
                        </div>

                        <!-- Donation Category -->
                        <div class="mb-3">
                            <label for="category" class="form-label fw-bold">Donation Category</label>
                            <select name="category" class="form-select" id="category" required>
                                <option value="" selected disabled>Select Category</option>
                                <option value="money">Money</option>
                                <option value="books">Books</option>
                            </select>
                        </div>

                        <!-- Address -->
                        <div class="mb-3">
                            <label for="address" class="form-label fw-bold">Address</label>
                            <textarea name="address" class="form-control" id="address" rows="3" placeholder="Enter contact address"></textarea>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Submit Donation</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center bg-white border-0 pb-3">
                    <a href="{% url 'donor_list' %}" class="text-muted text-decoration-none small">← View All Donors</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
